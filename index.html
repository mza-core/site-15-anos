<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Momentos especiais 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #6061b3, #280dbe);
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    .galeria {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .galeria img {
      width: 200px;
      height: 250px;
      object-fit: cover;
      margin: 10px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      transition: transform 0.3s;
    }

    .galeria img:hover {
      transform: scale(1.05);
    }

    .botao {
      background: rgba(7, 7, 7, 0);
      color: #be4dff;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>✨ Momentos especiais ✨</h1>
  <p>pequenos fragmentos da minha vida 💖</p>

  <a class="botao" href="#fotos">Ver Fotos</a>

  <h2 id="fotos">📸 Minha Galeria</h2>

  <div class="galeria">
    <img src="foto1.jpg.jpeg">
    <img src="foto2.jpg.jpeg">
    <img src="foto3.jpg.jpeg">
    <img src="foto4.jpg.jpeg">
  </div>

  <h2>🎵 Minha Música</h2>

  <audio controls autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
